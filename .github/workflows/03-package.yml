name: SudoStudio Final Build

on:
  workflow_dispatch:
    inputs:
      backend_run_id:
        required: true
      runtime_run_id:
        required: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: juleszackaria-lab/sudo-studio
          path: source

      - name: Download backend
        uses: dawidd6/action-download-artifact@v5
        with:
          repo: juleszackaria-lab/sudo-studio
          name: backend-exe
          path: build/backend
          run_id: ${{ github.event.inputs.backend_run_id }}

      - name: Download runtime
        uses: dawidd6/action-download-artifact@v5
        with:
          repo: juleszackaria-lab/sudo-studio
          name: runtime-exe
          path: build/runtime
          run_id: ${{ github.event.inputs.runtime_run_id }}

      - name: Prepare folders
        shell: cmd
        run: |
          if not exist build mkdir build
          if not exist build\SudoStudio mkdir build\SudoStudio
          if not exist build\SudoStudio\app mkdir build\SudoStudio\app
          if not exist build\SudoStudio\app\extensions mkdir build\SudoStudio\app\extensions

      - name: Download VSCodium
        shell: powershell
        run: |
          Invoke-WebRequest "https://github.com/VSCodium/vscodium/releases/download/1.97.2.25045/VSCodium-win32-x64-1.97.2.25045.zip" -OutFile "vscodium.zip"

      - name: Extract VSCodium
        shell: powershell
        run: |
          Expand-Archive -Path "vscodium.zip" -DestinationPath "build\SudoStudio\app" -Force

      - name: Copy files
        shell: cmd
        run: |
          copy build\backend\backend.exe build\SudoStudio\app\backend.exe /Y
          copy build\runtime\server.exe build\SudoStudio\app\runtime.exe /Y
          copy source\product.json build\SudoStudio\app\product.json /Y
          copy source\logo.ico build\SudoStudio\logo.ico /Y

      - name: Create extension
        shell: powershell
        run: |
          $dir="build\SudoStudio\app\extensions\sudo-ai"
          New-Item -ItemType Directory -Force -Path $dir

          $pkg = @{
            name = "sudo-ai"
            displayName = "Sudo AI"
            version = "1.0.0"
            engines = @{ vscode = "^1.97.0" }
            activationEvents = @("*")
            main = "extension.js"
          } | ConvertTo-Json -Depth 5

          Set-Content "$dir\package.json" $pkg

          $js = @"
const vscode = require("vscode");

function activate(context) {
    const panel = vscode.window.createWebviewPanel(
        "sudoAI",
        "Sudo AI",
        vscode.ViewColumn.Beside,
        { enableScripts: true }
    );

    panel.webview.html = getHtml();
}

function getHtml(){
return "<html><body><h2>Sudo AI</h2><input id='input' style='width:80%'><button onclick='send()'>Send</button><div id='chat' style='height:300px;overflow:auto;border:1px solid gray;'></div><script>async function send(){let i=document.getElementById('input');let c=document.getElementById('chat');let m=i.value;c.innerHTML+='<div>> '+m+'</div>';try{let r=await fetch('http://localhost:5000/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:m})});let d=await r.json();c.innerHTML+='<div><b>AI:</b> '+d.reply+'</div>';}catch(e){c.innerHTML+='<div style=color:red>Backend OFF</div>';}i.value='';}</script></body></html>";
}

exports.activate = activate;
"@

          Set-Content "$dir\extension.js" $js

      - name: Create start.bat
        shell: cmd
        run: |
          echo @echo off > build\SudoStudio\start.bat
          echo set BASE=%%~dp0 >> build\SudoStudio\start.bat
          echo set APP=%%BASE%%app >> build\SudoStudio\start.bat
          echo start "" "%%APP%%\backend.exe" >> build\SudoStudio\start.bat
          echo start "" "%%APP%%\runtime.exe" >> build\SudoStudio\start.bat
          echo timeout /t 3 ^>nul >> build\SudoStudio\start.bat
          echo start "" "%%APP%%\VSCodium.exe" --extensions-dir "%%APP%%\extensions" >> build\SudoStudio\start.bat

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Create installer
        shell: cmd
        run: |
          echo [Setup] > installer.iss
          echo AppName=SudoStudio Enterprise >> installer.iss
          echo AppVersion=1.0 >> installer.iss
          echo DefaultDirName={autopf}\SudoStudio >> installer.iss
          echo OutputDir=Output >> installer.iss
          echo OutputBaseFilename=SudoStudio-Enterprise >> installer.iss
          echo SetupIconFile=build\SudoStudio\logo.ico >> installer.iss

          echo [Files] >> installer.iss
          echo Source: "build\SudoStudio\*"; DestDir: "{app}"; Flags: recursesubdirs >> installer.iss

          echo [Icons] >> installer.iss
          echo Name: "{group}\SudoStudio Enterprise"; Filename: "{app}\start.bat" >> installer.iss
          echo Name: "{commondesktop}\SudoStudio Enterprise"; Filename: "{app}\start.bat" >> installer.iss

      - name: Build installer
        run: iscc installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SudoStudio-Installer
          path: Output\*.exe