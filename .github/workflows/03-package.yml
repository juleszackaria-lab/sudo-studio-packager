- name: Create extension
  shell: powershell
  run: |
    $dir = "build/SudoStudio/app/extensions/sudo-ai"
    New-Item -ItemType Directory -Force -Path $dir | Out-Null

    Set-Content "$dir/package.json" '{"name":"sudo-ai","displayName":"Sudo AI","version":"1.0.0","engines":{"vscode":"^1.97.0"},"activationEvents":["*"],"main":"extension.js"}'

    Set-Content "$dir/extension.js" @"
const vscode = require("vscode");

function activate(context) {
    const panel = vscode.window.createWebviewPanel(
        "sudoAI",
        "Sudo AI",
        vscode.ViewColumn.Beside,
        { enableScripts: true }
    );

    panel.webview.html = getHtml();
}

function getHtml(){
return `
<!DOCTYPE html>
<html>
<body>

<h2>Sudo AI</h2>

<input id="msg" style="width:75%">
<button onclick="send()">Send</button>

<div id="chat" style="margin-top:10px;height:300px;overflow:auto;border:1px solid gray;padding:5px;"></div>

<script>
async function send(){
    const input = document.getElementById("msg");
    const chat = document.getElementById("chat");

    const message = input.value;
    if(!message) return;

    chat.innerHTML += "<div><b>You:</b> "+message+"</div>";

    try {
        const res = await fetch("http://localhost:5000/chat", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({message: message})
        });

        const data = await res.json();
        chat.innerHTML += "<div><b>AI:</b> "+data.reply+"</div>";

    } catch(e){
        chat.innerHTML += "<div style='color:red'>Erreur connexion backend</div>";
    }

    input.value="";
}
</script>

</body>
</html>
`;
}

exports.activate = activate;
"@