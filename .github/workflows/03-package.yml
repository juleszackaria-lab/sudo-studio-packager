
name: SudoStudio Final Build

on:
  workflow_dispatch:
    inputs:
      backend_run_id:
        required: true
      runtime_run_id:
        required: true

jobs:
  build:
    runs-on: windows-latest

    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: juleszackaria-lab/sudo-studio
          path: source
          token: ${{ secrets.PAT_DOWNLOAD }}

      - name: Download backend
        uses: dawidd6/action-download-artifact@v5
        with:
          repo: juleszackaria-lab/sudo-studio
          name: backend-exe
          path: build/backend
          run_id: ${{ github.event.inputs.backend_run_id }}
          github_token: ${{ secrets.PAT_DOWNLOAD }}

      - name: Download runtime
        uses: dawidd6/action-download-artifact@v5
        with:
          repo: juleszackaria-lab/sudo-studio
          name: runtime-exe
          path: build/runtime
          run_id: ${{ github.event.inputs.runtime_run_id }}
          github_token: ${{ secrets.PAT_DOWNLOAD }}

      - name: Prepare folders
        shell: cmd
        run: |
          if not exist build mkdir build
          if not exist build\SudoStudio mkdir build\SudoStudio
          if not exist build\SudoStudio\app mkdir build\SudoStudio\app
          if not exist build\SudoStudio\app\extensions mkdir build\SudoStudio\app\extensions

      - name: Download VSCodium
        shell: powershell
        run: |
          Invoke-WebRequest "https://github.com/VSCodium/vscodium/releases/download/1.97.2.25045/VSCodium-win32-x64-1.97.2.25045.zip" -OutFile "vscodium.zip"

      - name: Extract VSCodium
        shell: powershell
        run: |
          Expand-Archive -Path "vscodium.zip" -DestinationPath "build\SudoStudio\app" -Force

      - name: Copy files
        shell: cmd
        run: |
          copy build\backend\backend.exe build\SudoStudio\app\backend.exe /Y
          copy build\runtime\server.exe build\SudoStudio\app\runtime.exe /Y
          copy source\product.json build\SudoStudio\app\product.json /Y
          copy source\logo.ico build\SudoStudio\logo.ico /Y

      - name: Create extension (SAFE)
        shell: cmd
        run: |
          mkdir build\SudoStudio\app\extensions\sudo-ai

          echo {> build\SudoStudio\app\extensions\sudo-ai\package.json
          echo "name":"sudo-ai",>> build\SudoStudio\app\extensions\sudo-ai\package.json
          echo "displayName":"Sudo AI",>> build\SudoStudio\app\extensions\sudo-ai\package.json
          echo "version":"1.0.0",>> build\SudoStudio\app\extensions\sudo-ai\package.json
          echo "engines":{"vscode":"^1.97.0"},>> build\SudoStudio\app\extensions\sudo-ai\package.json
          echo "activationEvents":["*"],>> build\SudoStudio\app\extensions\sudo-ai\package.json
          echo "main":"extension.js">> build\SudoStudio\app\extensions\sudo-ai\package.json
          echo }>> build\SudoStudio\app\extensions\sudo-ai\package.json

          echo const vscode = require('vscode');> build\SudoStudio\app\extensions\sudo-ai\extension.js
          echo function activate(context){>> build\SudoStudio\app\extensions\sudo-ai\extension.js
          echo const panel = vscode.window.createWebviewPanel('sudoAI','Sudo AI',vscode.ViewColumn.Beside,{enableScripts:true});>> build\SudoStudio\app\extensions\sudo-ai\extension.js
          echo panel.webview.html = "<h1>Sudo AI actif</h1>";>> build\SudoStudio\app\extensions\sudo-ai\extension.js
          echo }>> build\SudoStudio\app\extensions\sudo-ai\extension.js
          echo exports.activate = activate;>> build\SudoStudio\app\extensions\sudo-ai\extension.js

      - name: Create start.bat
        shell: cmd
        run: |
          echo @echo off > build\SudoStudio\start.bat
          echo set BASE=%%~dp0 >> build\SudoStudio\start.bat
          echo set APP=%%BASE%%app >> build\SudoStudio\start.bat

          echo if exist "%%APP%%\backend.exe" start "" "%%APP%%\backend.exe" --port 5000 >> build\SudoStudio\start.bat
          echo if exist "%%APP%%\runtime.exe" start "" "%%APP%%\runtime.exe" >> build\SudoStudio\start.bat

          echo timeout /t 3 ^>nul >> build\SudoStudio\start.bat

          echo if exist "%%APP%%\VSCodium.exe" start "" "%%APP%%\VSCodium.exe" --extensions-dir "%%APP%%\extensions" >> build\SudoStudio\start.bat

      - name: Install Inno Setup
        shell: cmd
        run: choco install innosetup -y

      - name: Create installer
        shell: cmd
        run: |
          echo [Setup] > installer.iss
          echo AppName=SudoStudio Enterprise >> installer.iss
          echo AppVersion=1.0 >> installer.iss
          echo DefaultDirName={autopf}\SudoStudio >> installer.iss
          echo OutputDir=Output >> installer.iss
          echo OutputBaseFilename=SudoStudio-Enterprise >> installer.iss
          echo SetupIconFile=build\SudoStudio\logo.ico >> installer.iss

          echo [Files] >> installer.iss
          echo Source: "build\SudoStudio\*"; DestDir: "{app}"; Flags: recursesubdirs >> installer.iss

          echo [Icons] >> installer.iss
          echo Name: "{group}\SudoStudio Enterprise"; Filename: "{app}\start.bat" >> installer.iss
          echo Name: "{commondesktop}\SudoStudio Enterprise"; Filename: "{app}\start.bat" >> installer.iss

      - name: Build installer
        run: iscc installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SudoStudio-Installer
          path: Output\*.exe