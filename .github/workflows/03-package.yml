name: 03 - SudoStudio Enterprise Packager

on:
  workflow_dispatch:
    inputs:
      backend_run_id:
        description: "Backend Run ID"
        required: true
      runtime_run_id:
        description: "Runtime Run ID"
        required: true
      confirm:
        description: "Type I_CONFIRM_RUN"
        required: true

jobs:
  package:
    if: ${{ github.event.inputs.confirm == 'I_CONFIRM_RUN' }}
    runs-on: windows-latest
    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout sudo-studio source
        uses: actions/checkout@v4
        with:
          repository: juleszackaria-lab/sudo-studio
          path: source
          token: ${{ secrets.PAT_DOWNLOAD }}

      - name: Download backend artifact
        uses: dawidd6/action-download-artifact@v5
        with:
          repo: juleszackaria-lab/sudo-studio
          name: backend-exe
          path: build/backend
          run_id: ${{ github.event.inputs.backend_run_id }}
          github_token: ${{ secrets.PAT_DOWNLOAD }}

      - name: Download runtime artifact
        uses: dawidd6/action-download-artifact@v5
        with:
          repo: juleszackaria-lab/sudo-studio
          name: runtime-exe
          path: build/runtime
          run_id: ${{ github.event.inputs.runtime_run_id }}
          github_token: ${{ secrets.PAT_DOWNLOAD }}

      - name: Prepare build folders
        shell: cmd
        run: |
          if not exist build mkdir build
          if not exist build\SudoStudio mkdir build\SudoStudio
          if not exist build\SudoStudio\app mkdir build\SudoStudio\app

      - name: Download VSCodium
        shell: powershell
        run: |
          $url = "https://github.com/VSCodium/vscodium/releases/download/1.97.2.25045/VSCodium-win32-x64-1.97.2.25045.zip"
          Invoke-WebRequest -Uri $url -OutFile vscodium.zip -UseBasicParsing

      - name: Verify VSCodium download
        shell: powershell
        run: |
          if (!(Test-Path "vscodium.zip")) {
            Write-Error "VSCodium zip not found. Aborting."
            exit 1
          } else {
            Write-Host "VSCodium zip downloaded successfully."
          }

      - name: Extract VSCodium
        shell: powershell
        run: |
          Expand-Archive -Path vscodium.zip -DestinationPath build\SudoStudio\app -Force
          Write-Host "VSCodium extracted."

      - name: Copy project files
        shell: cmd
        run: |
          copy build\backend\backend.exe build\SudoStudio\app\ /Y
          copy build\runtime\server.exe build\SudoStudio\app\runtime.exe /Y
          xcopy /E /I /Y source\web-ui build\SudoStudio\app\web-ui\
          copy /Y source\product.json build\SudoStudio\app\product.json
          copy /Y source\setup.bat build\SudoStudio\
          copy /Y source\setup.sh build\SudoStudio\

      - name: Create robust start.bat
        shell: powershell
        run: |
          $content = @'
@echo off
title SudoStudio Enterprise
set SCRIPT_DIR=%~dp0

echo Starting Backend...
if exist "%SCRIPT_DIR%app\backend.exe" (
    start "" "%SCRIPT_DIR%app\backend.exe"
) else (
    echo backend.exe not found!
    exit /b 1
)

echo Starting Runtime...
if exist "%SCRIPT_DIR%app\runtime.exe" (
    start "" "%SCRIPT_DIR%app\runtime.exe"
) else (
    echo runtime.exe not found!
    exit /b 1
)

timeout /t 3 /nobreak

echo Launching VS Codium (App)...
for /d %%D in ("%SCRIPT_DIR%app\VSCodium*") do (
    if exist "%%D\codium.exe" (
        start "" "%%D\codium.exe" --user-data-dir "%SCRIPT_DIR%data" --extensions-dir "%SCRIPT_DIR%extensions" --folder "%SCRIPT_DIR%app\web-ui"
        echo VS Codium started successfully.
    ) else (
        echo codium.exe not found in %%D
        exit /b 1
    )
)
'@

          Set-Content -Path "build\SudoStudio\start.bat" -Value $content -Encoding ASCII
          Write-Host "start.bat created."

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Generate installer.iss
        shell: powershell
        run: |
          $issContent = @'
[Setup]
AppName=SudoStudio Enterprise
AppVersion=1.0.0
AppPublisher=SudoStudio Lab
DefaultDirName={autopf}\SudoStudio
DefaultGroupName=SudoStudio
OutputDir=Output
OutputBaseFilename=SudoStudio-Enterprise-Setup
Compression=lzma
SolidCompression=yes
PrivilegesRequired=admin
ArchitecturesInstallIn64BitMode=x64

[Files]
Source: "build\SudoStudio\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

[Icons]
Name: "{group}\SudoStudio Enterprise"; Filename: "{app}\start.bat"; WorkingDir: "{app}"
Name: "{commondesktop}\SudoStudio Enterprise"; Filename: "{app}\start.bat"; WorkingDir: "{app}"

[Run]
Filename: "{app}\start.bat"; Description: "Launch SudoStudio Enterprise"; Flags: nowait postinstall skipifsilent shellexec
'@

          Set-Content -Path "installer.iss" -Value $issContent -Encoding ASCII
          Write-Host "installer.iss generated."

      - name: Build installer
        run: iscc installer.iss

      - name: Verify build output
        shell: cmd
        run: |
          dir build\SudoStudio\
          dir Output\

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SudoStudio-Enterprise-Installer
          path: Output\*.exe