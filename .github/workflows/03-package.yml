name: 03 - SudoStudio Enterprise Packager

on:
  workflow_dispatch:
    inputs:
      backend_run_id:
        description: Backend Run ID
        required: true
      runtime_run_id:
        description: Runtime Run ID
        required: true
      confirm:
        description: Type I_CONFIRM_RUN
        required: true

jobs:
  package:
    runs-on: windows-latest

    steps:

      - name: Check confirmation
        shell: bash
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "I_CONFIRM_RUN" ]; then
            echo "Confirmation incorrecte"
            exit 1
          fi

      - name: Checkout sudo-studio source
        uses: actions/checkout@v4
        with:
          repository: juleszackaria-lab/sudo-studio
          path: source
          token: ${{ secrets.PAT_DOWNLOAD }}

      - name: Download backend artifact
        uses: dawidd6/action-download-artifact@v5
        with:
          repo: juleszackaria-lab/sudo-studio
          name: backend-exe
          path: build/backend
          run_id: ${{ github.event.inputs.backend_run_id }}
          github_token: ${{ secrets.PAT_DOWNLOAD }}

      - name: Download runtime artifact
        uses: dawidd6/action-download-artifact@v5
        with:
          repo: juleszackaria-lab/sudo-studio
          name: runtime-exe
          path: build/runtime
          run_id: ${{ github.event.inputs.runtime_run_id }}
          github_token: ${{ secrets.PAT_DOWNLOAD }}

      - name: Prepare folders
        shell: cmd
        run: |
          mkdir build
          mkdir build\SudoStudio
          mkdir build\SudoStudio\app

      - name: Download VSCodium (robust)
        shell: powershell
        run: |
          $url = "https://github.com/VSCodium/vscodium/releases/download/1.97.2.25045/VSCodium-win32-x64-1.97.2.25045.zip"
          $output = "vscodium.zip"

          Write-Host "Downloading VSCodium..."

          try {
            Invoke-WebRequest -Uri $url -OutFile $output -UseBasicParsing
          } catch {
            Write-Host "Primary download failed, retrying with curl..."
            curl -L $url -o $output
          }

          if (!(Test-Path $output)) {
            Write-Error "Download failed completely"
            exit 1
          }

          Write-Host "Download OK"

      - name: Extract VSCodium
        shell: powershell
        run: |
          Expand-Archive vscodium.zip -DestinationPath build\SudoStudio\app

      - name: Copy project files
        shell: cmd
        run: |
          copy build\backend\backend.exe build\SudoStudio\app\
          copy build\runtime\server.exe build\SudoStudio\app\runtime.exe
          xcopy /E /I source\web-ui build\SudoStudio\app\web-ui\
          copy source\product.json build\SudoStudio\app\product.json
          copy source\setup.bat build\SudoStudio\
          copy source\setup.sh build\SudoStudio\

      - name: Create start.bat
        shell: cmd
        run: |
          echo @echo off >> build\SudoStudio\start.bat
          echo title SudoStudio Enterprise >> build\SudoStudio\start.bat
          echo set SCRIPT_DIR=%%~dp0 >> build\SudoStudio\start.bat
          echo start "" "%%SCRIPT_DIR%%app\backend.exe" >> build\SudoStudio\start.bat
          echo start "" "%%SCRIPT_DIR%%app\runtime.exe" >> build\SudoStudio\start.bat
          echo timeout /t 3 /nobreak >> build\SudoStudio\start.bat
          echo for /r "%%SCRIPT_DIR%%app" %%%%F in (codium.exe) do start "" "%%%%F" --user-data-dir "%%SCRIPT_DIR%%data" --extensions-dir "%%SCRIPT_DIR%%extensions" --folder "%%SCRIPT_DIR%%app\web-ui" >> build\SudoStudio\start.bat

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Create installer script
        shell: cmd
        run: |
          echo [Setup] > installer.iss
          echo AppName=SudoStudio Enterprise >> installer.iss
          echo AppVersion=1.0.0 >> installer.iss
          echo DefaultDirName={autopf}\SudoStudio >> installer.iss
          echo DefaultGroupName=SudoStudio >> installer.iss
          echo OutputDir=Output >> installer.iss
          echo OutputBaseFilename=SudoStudio-Enterprise-Setup >> installer.iss
          echo Compression=lzma >> installer.iss
          echo SolidCompression=yes >> installer.iss
          echo. >> installer.iss
          echo [Files] >> installer.iss
          echo Source: "build\SudoStudio\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs >> installer.iss
          echo. >> installer.iss
          echo [Icons] >> installer.iss
          echo Name: "{group}\SudoStudio Enterprise"; Filename: "{app}\start.bat" >> installer.iss
          echo Name: "{commondesktop}\SudoStudio Enterprise"; Filename: "{app}\start.bat" >> installer.iss

      - name: Build installer
        run: iscc installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: sudostudio-enterprise-installer
          path: Output\*.exe