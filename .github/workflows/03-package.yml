name: '03 - SudoStudio Enterprise Packager'

on:
  workflow_dispatch:
    inputs:
      backend_run_id:
        description: 'Backend Run ID'
        required: true
      runtime_run_id:
        description: 'Runtime Run ID'
        required: true

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: juleszackaria-lab/sudo-studio
          path: source
          token: ${{ secrets.PAT_DOWNLOAD }}

      - name: Download backend
        uses: dawidd6/action-download-artifact@v5
        with:
          repo: juleszackaria-lab/sudo-studio
          name: backend-exe
          path: build/backend
          run_id: ${{ github.event.inputs.backend_run_id }}
          github_token: ${{ secrets.PAT_DOWNLOAD }}

      - name: Download runtime
        uses: dawidd6/action-download-artifact@v5
        with:
          repo: juleszackaria-lab/sudo-studio
          name: runtime-exe
          path: build/runtime
          run_id: ${{ github.event.inputs.runtime_run_id }}
          github_token: ${{ secrets.PAT_DOWNLOAD }}

      - name: Prepare folders
        run: |
          mkdir build
          mkdir build\SudoStudio
          mkdir build\SudoStudio\app

      - name: Download VSCodium
        shell: powershell
        run: |
          Invoke-WebRequest "https://github.com/VSCodium/vscodium/releases/download/1.97.2.25045/VSCodium-win32-x64-1.97.2.25045.zip" -OutFile vscodium.zip

      - name: Extract
        shell: powershell
        run: |
          Expand-Archive vscodium.zip -DestinationPath build\SudoStudio\app -Force

      - name: Copy files
        shell: cmd
        run: |
          copy build\backend\backend.exe build\SudoStudio\app\ /Y
          copy build\runtime\server.exe build\SudoStudio\app\runtime.exe /Y
          xcopy /E /I /Y source\web-ui build\SudoStudio\app\web-ui\

      # ===== EXTENSION FIX DEFINITIF =====
      - name: Create extension (safe)
        shell: powershell
        run: |
          $dir = "build\SudoStudio\app\resources\app\extensions\sudo-ai"
          New-Item -ItemType Directory -Force -Path $dir

          Set-Content "$dir\package.json" '{"name":"sudo-ai","displayName":"Sudo AI","version":"1.0.0","engines":{"vscode":"^1.97.0"},"activationEvents":["*"],"main":"./extension.js"}'

          Set-Content "$dir\extension.js" "const vscode=require('vscode');exports.activate=function(){const panel=vscode.window.createWebviewPanel('sudo','Sudo AI',vscode.ViewColumn.Beside,{enableScripts:true});panel.webview.html=require('fs').readFileSync(__dirname+'\\\\webview.html','utf8');}"

          Set-Content "$dir\webview.html" "<html><body><h2>Sudo AI</h2><input id='i'><button onclick='s()'>Send</button><div id='d'></div><script>function s(){let i=document.getElementById('i');let d=document.getElementById('d');d.innerHTML+='<div>> '+i.value+'</div>';i.value='';}</script></body></html>"

      - name: Create start.bat
        shell: cmd
        run: |
          echo @echo off > build\SudoStudio\start.bat
          echo set BASE=%%~dp0 >> build\SudoStudio\start.bat
          echo for /r "%%BASE%%" %%%%F in ^(backend.exe^) do set B=%%%%F >> build\SudoStudio\start.bat
          echo for /r "%%BASE%%" %%%%F in ^(runtime.exe^) do set R=%%%%F >> build\SudoStudio\start.bat
          echo for /r "%%BASE%%" %%%%F in ^(codium.exe^) do set C=%%%%F >> build\SudoStudio\start.bat
          echo if defined B start "" "%%B%%" >> build\SudoStudio\start.bat
          echo if defined R start "" "%%R%%" >> build\SudoStudio\start.bat
          echo timeout /t 2 >> build\SudoStudio\start.bat
          echo if defined C start "" "%%C%%" --extensions-dir "%%BASE%%app\resources\app\extensions" >> build\SudoStudio\start.bat

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Create installer
        shell: cmd
        run: |
          echo [Setup] > installer.iss
          echo AppName=SudoStudio >> installer.iss
          echo DefaultDirName={autopf}\SudoStudio >> installer.iss
          echo OutputDir=Output >> installer.iss

          echo [Files] >> installer.iss
          echo Source: "build\SudoStudio\*"; DestDir: "{app}"; Flags: recursesubdirs >> installer.iss

          echo [Run] >> installer.iss
          echo Filename: "{app}\start.bat" >> installer.iss

      - name: Build
        run: iscc installer.iss

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: Output\*.exe