name: SudoStudio Stable Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download backend
        uses: dawidd6/action-download-artifact@v5
        with:
          repo: juleszackeria-lab/sudo-studio
          name: backend-exe
          path: build/backend
          run_id: 24709608974

      - name: Download runtime
        uses: dawidd6/action-download-artifact@v5
        with:
          repo: juleszackeria-lab/sudo-studio
          name: runtime-exe
          path: build/runtime
          run_id: 23684715163

      - name: Prepare folders
        shell: cmd
        run: |
          if not exist build mkdir build
          if not exist build\SudoStudio mkdir build\SudoStudio
          if not exist build\SudoStudio\app mkdir build\SudoStudio\app
          if not exist build\SudoStudio\app\extensions mkdir build\SudoStudio\app\extensions

      - name: Download VSCodium
        shell: powershell
        run: |
          Invoke-WebRequest `
            -Uri "https://github.com/VSCodium/vscodium/releases/download/1.97.2.25045/VSCodium-win32-x64-1.97.2.25045.zip" `
            -OutFile "vscodium.zip"

      - name: Extract VSCodium
        shell: powershell
        run: |
          Expand-Archive -Path "vscodium.zip" -DestinationPath "build\SudoStudio\app" -Force

      - name: Copy backend and runtime
        shell: cmd
        run: |
          copy build\backend\backend.exe build\SudoStudio\app\backend.exe /Y
          copy build\runtime\server.exe build\SudoStudio\app\runtime.exe /Y
          if exist logo.ico copy logo.ico build\SudoStudio\logo.ico /Y

      - name: Copy Sudo AI Extension
        shell: cmd
        run: |
          if exist sudo-ai-extension (
            xcopy sudo-ai-extension build\SudoStudio\app\extensions\sudo-ai /E /I /Y
          ) else (
            echo ERROR: sudo-ai-extension folder missing
            exit /b 1
          )

      - name: Create start.bat
        shell: powershell
        run: |
          $bat = @'
          @echo off
          cd /d "%~dp0"
          echo Starting Sudo Studio...
          set APP=%~dp0app

          echo Checking required files...
          if not exist "%APP%\backend.exe" (echo backend.exe missing & pause & exit)
          if not exist "%APP%\runtime.exe" (echo runtime.exe missing & pause & exit)
          if not exist "%APP%\VSCodium.exe" (echo VSCodium.exe missing & pause & exit)

          echo Launching backend...
          start "" "%APP%\backend.exe"
          timeout /t 2 >nul

          echo Launching runtime...
          start "" "%APP%\runtime.exe"
          timeout /t 3 >nul

          echo Launching VSCodium...
          start "" "%APP%\VSCodium.exe" --extensions-dir "%APP%\extensions"
          exit
          '@
          $bat | Out-File -FilePath "build\SudoStudio\start.bat" -Encoding ascii

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Create installer script
        shell: powershell
        run: |
          $iss = @'
          [Setup]
          AppName=SudoStudio
          AppVersion=1.0
          DefaultDirName={autopf}\SudoStudio
          OutputDir=Output
          OutputBaseFilename=SudoStudio

          [Files]
          Source: "build\SudoStudio\*"; DestDir: "{app}"; Flags: recursesubdirs

          [Icons]
          Name: "{group}\SudoStudio"; Filename: "{app}\start.bat"
          '@
          $iss | Out-File -FilePath "installer.iss" -Encoding ascii

      - name: Build installer
        run: iscc installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: Output\*.exe
