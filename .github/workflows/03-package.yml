name: SudoStudio Stable Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

env:
  BACKEND_RUN_ID: "28027052916"
  RUNTIME_RUN_ID: "28027067429"

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      # -- 1. Checkout this repo ------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -- 1b. Checkout Sudo-studio repo ----------------------------------------
      - name: Checkout sudo-ai-extension from Sudo-studio
        uses: actions/checkout@v4
        with:
          repository: juleszackeria-lab/Sudo-studio
          path: _sudo-studio-source
          ref: main
          token: ${{ secrets.PAT_TOKEN }}

      # -- 2. Copy sudo-ai-extension --------------------------------------------
      - name: Copy sudo-ai-extension into workspace
        shell: cmd
        run: |
          if exist _sudo-studio-source\sudo-ai-extension (
            xcopy _sudo-studio-source\sudo-ai-extension sudo-ai-extension /E /I /Y /Q
            echo sudo-ai-extension copied from Sudo-studio repo.
          ) else (
            echo ERROR: sudo-ai-extension not found in Sudo-studio repo
            dir _sudo-studio-source
            exit /b 1
          )

      # -- 3. Download backend.exe ----------------------------------------------
      - name: Download backend.exe (by run ID)
        uses: dawidd6/action-download-artifact@v5
        with:
          repo: juleszackeria-lab/Sudo-studio
          run_id: ${{ env.BACKEND_RUN_ID }}
          name: backend-exe
          path: build/backend
          if_no_artifact_found: warn

      # -- 4. Download runtime.exe ----------------------------------------------
      - name: Download runtime.exe (by run ID)
        uses: dawidd6/action-download-artifact@v5
        with:
          repo: juleszackeria-lab/Sudo-studio
          run_id: ${{ env.RUNTIME_RUN_ID }}
          name: runtime-exe
          path: build/runtime
          if_no_artifact_found: warn

      # -- 5. Validate artifact binaries ----------------------------------------
      - name: Validate artifact binaries
        shell: powershell
        run: |
          $backendPath = "build\backend\backend.exe"
          $runtimePath = "build\runtime\server.exe"
          $MIN_SIZE_BYTES = 500000

          function Assert-Binary($p, $name) {
            if (-not (Test-Path $p)) {
              Write-Error "$name NOT FOUND at $p. Run workflow 01 / 02 first."
              exit 1
            }
            $size = (Get-Item $p).Length
            if ($size -lt $MIN_SIZE_BYTES) {
              Write-Error "$name is only $size bytes -- looks like a placeholder."
              exit 1
            }
            Write-Host "OK: $name ($([math]::Round($size/1MB,1)) MB)"
          }

          Assert-Binary $backendPath "backend.exe"
          Assert-Binary $runtimePath "runtime.exe (server.exe)"

      # -- 6. Setup Node.js -----------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # -- 7. Install extension dependencies ------------------------------------
      - name: Install extension node_modules
        shell: cmd
        run: |
          cd sudo-ai-extension
          npm install --production
          echo Extension node_modules installed.

      # -- 8. Prepare build folders
