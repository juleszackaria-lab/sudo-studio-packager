name: 03 - SudoStudio Enterprise Packager

on:
  workflow_dispatch:
    inputs:
      backend_run_id:
        description: Backend Run ID
        required: true
      runtime_run_id:
        description: Runtime Run ID
        required: true
      confirm:
        description: Type I_CONFIRM_RUN
        required: true

jobs:
  package:
    runs-on: windows-latest

    steps:

      - name: Check confirmation
        shell: bash
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "I_CONFIRM_RUN" ]; then
            echo "Confirmation incorrecte"
            exit 1
          fi

      - name: Checkout sudo-studio source
        uses: actions/checkout@v4
        with:
          repository: juleszackaria-lab/sudo-studio
          path: source
          token: ${{ secrets.PAT_DOWNLOAD }}

      - name: Download backend artifact
        uses: dawidd6/action-download-artifact@v5
        with:
          repo: juleszackaria-lab/sudo-studio
          name: backend-exe
          path: build/backend
          run_id: ${{ github.event.inputs.backend_run_id }}
          github_token: ${{ secrets.PAT_DOWNLOAD }}

      - name: Download runtime artifact
        uses: dawidd6/action-download-artifact@v5
        with:
          repo: juleszackaria-lab/sudo-studio
          name: runtime-exe
          path: build/runtime
          run_id: ${{ github.event.inputs.runtime_run_id }}
          github_token: ${{ secrets.PAT_DOWNLOAD }}

      - name: Prepare folders
        shell: cmd
        run: |
          mkdir build
          mkdir build\SudoStudio
          mkdir build\SudoStudio\app

      - name: Download VSCodium
        shell: powershell
        run: |
          Invoke-WebRequest https://github.com/VSCodium/vscodium/releases/download/1.97.2.25045/VSCodium-win32-x64-1.97.2.25045.zip -OutFile vscodium.zip

      - name: Extract VSCodium
        shell: powershell
        run: |
          Expand-Archive vscodium.zip -DestinationPath build\SudoStudio\app

      - name: Copy project files
        shell: cmd
        run: |
          copy build\backend\backend.exe build\SudoStudio\app\
          copy build\runtime\server.exe build\SudoStudio\app\runtime.exe
          xcopy /E /I source\web-ui build\SudoStudio\app\web-ui\
          copy source\product.json build\SudoStudio\app\product.json
          copy source\setup.bat build\SudoStudio\
          copy source\setup.sh build\SudoStudio\

      # 🔥 VERSION PRO START.BAT
      - name: Create start.bat
        shell: powershell
        run: |
          $content = @'
@echo off
title SudoStudio Enterprise
color 0A

set SCRIPT_DIR=%~dp0
set APP_DIR=%SCRIPT_DIR%app
set LOG_FILE=%SCRIPT_DIR%launch.log

echo ============================ > "%LOG_FILE%"
echo SudoStudio Launch >> "%LOG_FILE%"
echo ============================ >> "%LOG_FILE%"
echo.

echo [INFO] Starting SudoStudio...
echo [INFO] Base dir: %SCRIPT_DIR% >> "%LOG_FILE%"

REM ========================
REM BACKEND
REM ========================
set BACKEND_EXE=
for /r "%APP_DIR%" %%F in (backend.exe) do set BACKEND_EXE=%%F

if not defined BACKEND_EXE (
  for /r "%APP_DIR%" %%F in (*.exe) do (
    set BACKEND_EXE=%%F
    goto start_backend
  )
)

:start_backend
if defined BACKEND_EXE (
  echo [OK] Backend: %BACKEND_EXE%
  echo Backend: %BACKEND_EXE% >> "%LOG_FILE%"
  start "" "%BACKEND_EXE%"
) else (
  echo [ERROR] Backend not found
  echo Backend not found >> "%LOG_FILE%"
)

REM ========================
REM RUNTIME
REM ========================
set RUNTIME_EXE=
for /r "%APP_DIR%" %%F in (runtime.exe) do set RUNTIME_EXE=%%F

if not defined RUNTIME_EXE (
  for /r "%APP_DIR%" %%F in (*server*.exe) do (
    set RUNTIME_EXE=%%F
    goto start_runtime
  )
)

:start_runtime
if defined RUNTIME_EXE (
  echo [OK] Runtime: %RUNTIME_EXE%
  echo Runtime: %RUNTIME_EXE% >> "%LOG_FILE%"
  start "" "%RUNTIME_EXE%"
) else (
  echo [ERROR] Runtime not found
  echo Runtime not found >> "%LOG_FILE%"
)

timeout /t 3 /nobreak

REM ========================
REM CODIUM
REM ========================
set CODIUM_EXE=
for /r "%APP_DIR%" %%F in (codium.exe) do set CODIUM_EXE=%%F

if defined CODIUM_EXE (
  echo [OK] Codium: %CODIUM_EXE%
  echo Codium: %CODIUM_EXE% >> "%LOG_FILE%"
  start "" "%CODIUM_EXE%" --user-data-dir "%SCRIPT_DIR%data" --extensions-dir "%SCRIPT_DIR%extensions" --folder "%APP_DIR%\web-ui"
) else (
  echo [ERROR] Codium not found
  echo Codium not found >> "%LOG_FILE%"
)

echo [DONE] Launch complete >> "%LOG_FILE%"
pause
'@

          Set-Content -Path "build\SudoStudio\start.bat" -Value $content -Encoding ASCII

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Create installer script
        shell: cmd
        run: |
          echo [Setup] > installer.iss
          echo AppName=SudoStudio Enterprise >> installer.iss
          echo AppVersion=1.0.0 >> installer.iss
          echo DefaultDirName={autopf}\SudoStudio >> installer.iss
          echo DefaultGroupName=SudoStudio >> installer.iss
          echo OutputDir=Output >> installer.iss
          echo OutputBaseFilename=SudoStudio-Enterprise-Setup >> installer.iss
          echo Compression=lzma >> installer.iss
          echo SolidCompression=yes >> installer.iss
          echo. >> installer.iss
          echo [Files] >> installer.iss
          echo Source: "build\SudoStudio\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs >> installer.iss
          echo. >> installer.iss
          echo [Icons] >> installer.iss
          echo Name: "{group}\SudoStudio Enterprise"; Filename: "{app}\start.bat" >> installer.iss
          echo Name: "{commondesktop}\SudoStudio Enterprise"; Filename: "{app}\start.bat" >> installer.iss

      - name: Build installer
        run: iscc installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: sudostudio-enterprise-installer
          path: Output\*.exe