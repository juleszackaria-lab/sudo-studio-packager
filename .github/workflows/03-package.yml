name: '03 - SudoStudio Enterprise Packager'

on:
  workflow_dispatch:
    inputs:
      backend_run_id:
        required: true
      runtime_run_id:
        required: true

jobs:
  package:
    runs-on: windows-latest

    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: juleszackaria-lab/sudo-studio
          path: source
          token: ${{ secrets.PAT_DOWNLOAD }}

      - name: Download backend
        uses: dawidd6/action-download-artifact@v5
        with:
          repo: juleszackaria-lab/sudo-studio
          name: backend-exe
          path: build/backend
          run_id: ${{ github.event.inputs.backend_run_id }}
          github_token: ${{ secrets.PAT_DOWNLOAD }}

      - name: Download runtime
        uses: dawidd6/action-download-artifact@v5
        with:
          repo: juleszackaria-lab/sudo-studio
          name: runtime-exe
          path: build/runtime
          run_id: ${{ github.event.inputs.runtime_run_id }}
          github_token: ${{ secrets.PAT_DOWNLOAD }}

      - name: Prepare folders (SAFE)
        shell: cmd
        run: |
          if not exist "build" mkdir "build"
          if not exist "build\SudoStudio" mkdir "build\SudoStudio"
          if not exist "build\SudoStudio\app" mkdir "build\SudoStudio\app"
          if not exist "build\SudoStudio\app\extensions" mkdir "build\SudoStudio\app\extensions"

      - name: Download VSCodium
        shell: powershell
        run: |
          Invoke-WebRequest https://github.com/VSCodium/vscodium/releases/download/1.97.2.25045/VSCodium-win32-x64-1.97.2.25045.zip -OutFile vscodium.zip

      - name: Extract VSCodium
        shell: powershell
        run: |
          Expand-Archive vscodium.zip -DestinationPath build\SudoStudio\app -Force

      - name: Copy files
        shell: cmd
        run: |
          copy build\backend\backend.exe build\SudoStudio\app\ /Y
          copy build\runtime\server.exe build\SudoStudio\app\runtime.exe /Y
          xcopy source\web-ui build\SudoStudio\app\web-ui\ /E /I /Y
          copy source\product.json build\SudoStudio\app\product.json /Y

      - name: Create extension (SAFE)
        shell: cmd
        run: |
          if not exist build\SudoStudio\app\extensions\sudo-ai mkdir build\SudoStudio\app\extensions\sudo-ai

          echo {"name":"sudo-ai","main":"extension.js"} > build\SudoStudio\app\extensions\sudo-ai\package.json

          echo const vscode=require('vscode'); > build\SudoStudio\app\extensions\sudo-ai\extension.js
          echo function activate(){} >> build\SudoStudio\app\extensions\sudo-ai\extension.js
          echo exports.activate=activate; >> build\SudoStudio\app\extensions\sudo-ai\extension.js

      - name: Create start.bat (SAFE)
        shell: cmd
        run: |
          echo @echo off > build\SudoStudio\start.bat
          echo set BASE=%%~dp0 >> build\SudoStudio\start.bat

          echo for /r "%%BASE%%" %%%%F in ^(backend.exe^) do set BACKEND=%%%%F >> build\SudoStudio\start.bat
          echo for /r "%%BASE%%" %%%%F in ^(runtime.exe^) do set RUNTIME=%%%%F >> build\SudoStudio\start.bat
          echo for /r "%%BASE%%" %%%%F in ^(VSCodium.exe^) do set CODIUM=%%%%F >> build\SudoStudio\start.bat

          echo if defined BACKEND start "" "%%BACKEND%%" >> build\SudoStudio\start.bat
          echo if defined RUNTIME start "" "%%RUNTIME%%" >> build\SudoStudio\start.bat

          echo timeout /t 3 /nobreak ^>nul >> build\SudoStudio\start.bat

          echo if defined CODIUM start "" "%%CODIUM%%" >> build\SudoStudio\start.bat

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Create installer.iss
        shell: cmd
        run: |
          echo [Setup] > installer.iss
          echo AppName=SudoStudio >> installer.iss
          echo AppVersion=1.0 >> installer.iss
          echo DefaultDirName={autopf}\SudoStudio >> installer.iss
          echo OutputDir=Output >> installer.iss

          echo [Files] >> installer.iss
          echo Source: "build\SudoStudio\*"; DestDir: "{app}"; Flags: recursesubdirs >> installer.iss

          echo [Icons] >> installer.iss
          echo Name: "{group}\SudoStudio"; Filename: "{app}\start.bat" >> installer.iss

      - name: Build installer
        run: iscc installer.iss

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: Output\*.exe