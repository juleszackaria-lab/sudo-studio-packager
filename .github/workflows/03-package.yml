name: SudoStudio Final Build

on:
  workflow_dispatch:
    inputs:
      backend_run_id:
        required: true
      runtime_run_id:
        required: true

jobs:
  build:
    runs-on: windows-latest

    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: juleszackeria-lab/sudo-studio
          path: source

      - name: Download backend
        uses: dawidd6/action-download-artifact@v5
        with:
          repo: juleszackaria-lab/sudo-studio
          name: backend-exe
          path: build/backend
          run_id: ${{ github.event.inputs.backend_run_id }}

      - name: Download runtime
        uses: dawidd6/action-download-artifact@v5
        with:
          repo: juleszackaria-lab/sudo-studio
          name: runtime-exe
          path: build/runtime
          run_id: ${{ github.event.inputs.runtime_run_id }}

      - name: Prepare folders
        shell: powershell
        run: |
          $dirs = @(
            "build\SudoStudio",
            "build\SudoStudio\app",
            "build\SudoStudio\app\extensions",
            "build\SudoStudio\app\extensions\sudo-ai"
          )
          foreach ($d in $dirs) {
            if (-not (Test-Path $d)) { New-Item -ItemType Directory -Path $d | Out-Null }
          }

      - name: Download VSCodium
        shell: powershell
        run: |
          Invoke-WebRequest "https://github.com/VSCodium/vscodium/releases/download/1.97.2.25045/VSCodium-win32-x64-1.97.2.25045.zip" -OutFile "vscodium.zip"

      - name: Extract VSCodium
        shell: powershell
        run: |
          Expand-Archive -Path "vscodium.zip" -DestinationPath "build\SudoStudio\app" -Force

      - name: Copy files
        shell: powershell
        run: |
          Copy-Item "build\backend\backend.exe" "build\SudoStudio\app\backend.exe" -Force
          Copy-Item "build\runtime\server.exe"  "build\SudoStudio\app\runtime.exe"  -Force
          Copy-Item "source\product.json"        "build\SudoStudio\app\product.json" -Force
          Copy-Item "source\logo.ico"            "build\SudoStudio\logo.ico"         -Force

      - name: Create extension package.json
        shell: powershell
        run: |
          $pkg = @{
            name = "sudo-ai"
            displayName = "Sudo AI"
            version = "1.0.0"
            engines = @{ vscode = "^1.97.0" }
            activationEvents = @("*")
            main = "extension.js"
          }
          $pkg | ConvertTo-Json -Depth 5 | Set-Content "build\SudoStudio\app\extensions\sudo-ai\package.json" -Encoding UTF8

      - name: Create extension.js
        shell: powershell
        run: |
          $js = @'
const vscode = require('vscode');

function activate(context) {
  const panel = vscode.window.createWebviewPanel(
    'sudoAI', 'Sudo AI',
    vscode.ViewColumn.Beside,
    { enableScripts: true }
  );
  panel.webview.html = getHtml();
}

function getHtml() {
  return `<!DOCTYPE html>
<html>
<body>
  <h2>Sudo AI</h2>
  <input id="msg" style="width:80%" placeholder="Votre message..." />
  <button onclick="send()">Envoyer</button>
  <div id="chat" style="height:300px;overflow:auto;border:1px solid gray;margin-top:8px;padding:4px;"></div>
  <script>
    async function send() {
      const m = document.getElementById('msg').value;
      const c = document.getElementById('chat');
      c.innerHTML += '<div><b>Vous:</b> ' + m + '</div>';
      try {
        const r = await fetch('http://localhost:5000/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: m })
        });
        const d = await r.json();
        c.innerHTML += '<div><b>AI:</b> ' + d.reply + '</div>';
      } catch(e) {
        c.innerHTML += '<div style="color:red">Backend OFF</div>';
      }
      document.getElementById('msg').value = '';
      c.scrollTop = c.scrollHeight;
    }
  </script>
</body>
</html>`;
}

exports.activate = activate;
'@
          Set-Content "build\SudoStudio\app\extensions\sudo-ai\extension.js" -Value $js -Encoding UTF8

      - name: Create start.bat
        shell: powershell
        run: |
          $bat = @'
@echo off
set BASE=%~dp0
for /r "%BASE%" %%F in (backend.exe) do set BACK=%%F
for /r "%BASE%" %%F in (runtime.exe)  do set RUN=%%F
for /r "%BASE%" %%F in (VSCodium.exe) do set COD=%%F
if defined BACK start "" "%BACK%"
if defined RUN  start "" "%RUN%"
timeout /t 3 >nul
if defined COD  start "" "%COD%" --extensions-dir "%BASE%app\extensions"
'@
          Set-Content "build\SudoStudio\start.bat" -Value $bat -Encoding ASCII

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y

      - name: Create installer script
        shell: powershell
        run: |
          $iss = @'
[Setup]
AppName=SudoStudio Enterprise
AppVersion=1.0
DefaultDirName={autopf}\SudoStudio
OutputDir=Output
OutputBaseFilename=SudoStudio-Enterprise
SetupIconFile=build\SudoStudio\logo.ico

[Files]
Source: "build\SudoStudio\*"; DestDir: "{app}"; Flags: recursesubdirs

[Icons]
Name: "{group}\SudoStudio Enterprise"; Filename: "{app}\start.bat"
Name: "{commondesktop}\SudoStudio Enterprise"; Filename: "{app}\start.bat"
'@
          Set-Content "installer.iss" -Value $iss -Encoding UTF8

      - name: Build installer
        run: iscc installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SudoStudio-Installer
          path: Output\*.exe