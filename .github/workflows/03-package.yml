name: '03 - SudoStudio Enterprise Packager'

on:
  workflow_dispatch:
    inputs:
      backend_run_id:
        description: 'Backend Run ID'
        required: true
      runtime_run_id:
        description: 'Runtime Run ID'
        required: true

jobs:
  package:
    runs-on: windows-latest

    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout sudo-studio source
        uses: actions/checkout@v4
        with:
          repository: juleszackaria-lab/sudo-studio
          path: source
          token: ${{ secrets.PAT_DOWNLOAD }}

      - name: Download backend artifact
        uses: dawidd6/action-download-artifact@v5
        with:
          repo: juleszackaria-lab/sudo-studio
          name: backend-exe
          path: build/backend
          run_id: ${{ github.event.inputs.backend_run_id }}
          github_token: ${{ secrets.PAT_DOWNLOAD }}

      - name: Download runtime artifact
        uses: dawidd6/action-download-artifact@v5
        with:
          repo: juleszackaria-lab/sudo-studio
          name: runtime-exe
          path: build/runtime
          run_id: ${{ github.event.inputs.runtime_run_id }}
          github_token: ${{ secrets.PAT_DOWNLOAD }}

      - name: Prepare build folders
        shell: cmd
        run: |
          if not exist build mkdir build
          if not exist build\SudoStudio mkdir build\SudoStudio
          if not exist build\SudoStudio\app mkdir build\SudoStudio\app

      - name: Download VSCodium
        shell: powershell
        run: |
          $url = "https://github.com/VSCodium/vscodium/releases/download/1.97.2.25045/VSCodium-win32-x64-1.97.2.25045.zip"
          Invoke-WebRequest -Uri $url -OutFile "vscodium.zip"

      - name: Extract VSCodium
        shell: powershell
        run: |
          Expand-Archive -Path "vscodium.zip" -DestinationPath "build\SudoStudio\app" -Force

      - name: Copy project files
        shell: cmd
        run: |
          copy build\backend\backend.exe build\SudoStudio\app\ /Y
          copy build\runtime\server.exe build\SudoStudio\app\runtime.exe /Y
          xcopy /E /I /Y source\web-ui build\SudoStudio\app\web-ui\
          copy /Y source\product.json build\SudoStudio\app\product.json
          copy /Y source\setup.bat build\SudoStudio\
          copy /Y source\setup.sh build\SudoStudio\

      # ===== EXTENSION CORRIGÉE =====
      - name: Create VS Code extension for Sudo AI
        shell: cmd
        run: |
          mkdir build\SudoStudio\app\resources\app\extensions\sudo-ai

          echo {^
            "name": "sudo-ai",^
            "displayName": "Sudo AI",^
            "description": "Copilot-style AI Chat",^
            "version": "1.0.0",^
            "engines": { "vscode": "^1.97.0" },^
            "activationEvents": ["*"],^
            "main": "./extension.js"^
          } > build\SudoStudio\app\resources\app\extensions\sudo-ai\package.json

          echo const vscode = require('vscode'); > build\SudoStudio\app\resources\app\extensions\sudo-ai\extension.js
          echo const fs = require('fs'); >> build\SudoStudio\app\resources\app\extensions\sudo-ai\extension.js
          echo function activate(context) { >> build\SudoStudio\app\resources\app\extensions\sudo-ai\extension.js
          echo const panel = vscode.window.createWebviewPanel('sudoAI','Sudo AI', vscode.ViewColumn.Beside,{enableScripts:true}); >> build\SudoStudio\app\resources\app\extensions\sudo-ai\extension.js
          echo panel.webview.html = fs.readFileSync(__dirname + '\\webview.html','utf8'); >> build\SudoStudio\app\resources\app\extensions\sudo-ai\extension.js
          echo } >> build\SudoStudio\app\resources\app\extensions\sudo-ai\extension.js
          echo exports.activate = activate; >> build\SudoStudio\app\resources\app\extensions\sudo-ai\extension.js

          echo ^<html^>^<body^>^<h2^>Sudo AI Chat^</h2^>^<input id="input" style="width:80%"^>^<button onclick="send()"^>Send^</button^>^<div id="msg" style="height:300px;overflow:auto;border:1px solid gray;"^>^</div^>^<script^>function send(){let i=document.getElementById('input');let d=document.getElementById('msg');d.innerHTML+='<div>> '+i.value+'</div>';i.value='';}^</script^>^</body^>^</html^> > build\SudoStudio\app\resources\app\extensions\sudo-ai\webview.html

      # ===== START.BAT CORRIGÉ =====
      - name: Create smart start.bat
        shell: cmd
        run: |
          echo @echo off > build\SudoStudio\start.bat
          echo setlocal >> build\SudoStudio\start.bat
          echo set "BASE=%%~dp0" >> build\SudoStudio\start.bat

          echo for /r "%%BASE%%" %%%%F in ^(backend.exe^) do set "BACKEND=%%%%F" >> build\SudoStudio\start.bat
          echo for /r "%%BASE%%" %%%%F in ^(runtime.exe^) do set "RUNTIME=%%%%F" >> build\SudoStudio\start.bat
          echo for /r "%%BASE%%" %%%%F in ^(codium.exe^) do set "CODIUM=%%%%F" >> build\SudoStudio\start.bat

          echo if defined BACKEND start "" "%%BACKEND%%" >> build\SudoStudio\start.bat
          echo if defined RUNTIME start "" "%%RUNTIME%%" >> build\SudoStudio\start.bat

          echo timeout /t 3 /nobreak ^>nul >> build\SudoStudio\start.bat

          echo if defined CODIUM start "" "%%CODIUM%%" --extensions-dir "%%BASE%%app\resources\app\extensions" >> build\SudoStudio\start.bat

      - name: Install Inno Setup
        shell: cmd
        run: choco install innosetup -y

      - name: Generate installer.iss
        shell: cmd
        run: |
          echo [Setup] > installer.iss
          echo AppName=SudoStudio Enterprise >> installer.iss
          echo AppVersion=1.0.0 >> installer.iss
          echo DefaultDirName={autopf}\SudoStudio >> installer.iss
          echo OutputDir=Output >> installer.iss
          echo OutputBaseFilename=SudoStudio-Setup >> installer.iss

          echo. >> installer.iss
          echo [Files] >> installer.iss
          echo Source: "build\SudoStudio\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs >> installer.iss

          echo. >> installer.iss
          echo [Run] >> installer.iss
          echo Filename: "{app}\start.bat"; Flags: nowait postinstall >> installer.iss

      - name: Build installer
        run: iscc installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SudoStudio-Installer
          path: Output\*.exe