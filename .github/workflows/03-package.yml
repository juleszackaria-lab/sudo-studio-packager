name: 03 - SudoStudio Enterprise Packager

on:
  workflow_dispatch:
    inputs:
      backend_run_id:
        description: "Backend Run ID"
        required: true
      runtime_run_id:
        description: "Runtime Run ID"
        required: true
      confirm:
        description: "Type I_CONFIRM_RUN"
        required: true

jobs:
  package:
    if: ${{ github.event.inputs.confirm == 'I_CONFIRM_RUN' }}
    runs-on: windows-latest

    permissions:
      actions: read
      contents: read

    steps:

      - name: Check confirmation
        shell: bash
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "I_CONFIRM_RUN" ]; then
            echo "Confirmation incorrecte"
            exit 1
          fi

      - name: Checkout sudo-studio source
        uses: actions/checkout@v4
        with:
          repository: juleszackaria-lab/sudo-studio
          path: source
          token: ${{ secrets.PAT_DOWNLOAD }}

      - name: Download backend artifact
        uses: dawidd6/action-download-artifact@v5
        with:
          repo: juleszackaria-lab/sudo-studio
          name: backend-exe
          path: build/backend
          run_id: ${{ github.event.inputs.backend_run_id }}
          github_token: ${{ secrets.PAT_DOWNLOAD }}

      - name: Download runtime artifact
        uses: dawidd6/action-download-artifact@v5
        with:
          repo: juleszackaria-lab/sudo-studio
          name: runtime-exe
          path: build/runtime
          run_id: ${{ github.event.inputs.runtime_run_id }}
          github_token: ${{ secrets.PAT_DOWNLOAD }}

      - name: Prepare folders
        shell: cmd
        run: |
          mkdir build
          mkdir build\SudoStudio
          mkdir build\SudoStudio\app
          mkdir build\SudoStudio\data
          mkdir build\SudoStudio\extensions

      - name: Download VSCodium
        shell: powershell
        run: |
          $url = "https://github.com/VSCodium/vscodium/releases/download/1.97.2.25045/VSCodium-win32-x64-1.97.2.25045.zip"
          Invoke-WebRequest -Uri $url -OutFile "vscodium.zip" -UseBasicParsing

      - name: Verify VSCodium download
        shell: powershell
        run: |
          if (!(Test-Path "vscodium.zip")) {
            Write-Error "VSCodium zip not found"
            exit 1
          }

      - name: Extract VSCodium
        shell: powershell
        run: |
          Expand-Archive vscodium.zip -DestinationPath build\SudoStudio\app

      - name: Copy project files
        shell: cmd
        run: |
          copy build\backend\backend.exe build\SudoStudio\app\
          copy build\runtime\server.exe build\SudoStudio\app\runtime.exe
          xcopy /E /I source\web-ui build\SudoStudio\app\web-ui\
          xcopy /E /I source\webE build\SudoStudio\app\webE\
          xcopy /E /I source\FSE build\SudoStudio\app\FSE\
          copy source\product.json build\SudoStudio\app\product.json
          copy source\setup.bat build\SudoStudio\
          copy source\setup.sh build\SudoStudio\

      - name: Create robust start.bat
        shell: powershell
        run: |
          $startBat = @'
@echo off
title SudoStudio Enterprise
set SCRIPT_DIR=%~dp0

echo [INFO] Launching backend...
for /r "%SCRIPT_DIR%app" %%F in (backend.exe) do (
    echo Starting %%F
    start "" "%%F"
)

echo [INFO] Launching runtime...
for /r "%SCRIPT_DIR%app" %%F in (runtime.exe) do (
    echo Starting %%F
    start "" "%%F"
)

timeout /t 3 /nobreak

echo [INFO] Launching VSCodium...
for /d %%D in ("%SCRIPT_DIR%app\VSCodium*") do (
    if (Test-Path "%%D\codium.exe") (
        start "" "%%D\codium.exe" --user-data-dir "%SCRIPT_DIR%data" --extensions-dir "%SCRIPT_DIR%extensions" --folder "%SCRIPT_DIR%app\web-ui"
        echo [INFO] VSCodium launched from %%D
    )
)

echo [INFO] All processes started.
'@

          Set-Content -Path "build\SudoStudio\start.bat" -Value $startBat -Encoding ASCII

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Generate installer.iss
        shell: powershell
        run: |
          $issContent = @'
[Setup]
AppName=SudoStudio Enterprise
AppVersion=1.0.0
AppPublisher=SudoStudio Lab
DefaultDirName={autopf}\SudoStudio
DefaultGroupName=SudoStudio
OutputDir=Output
OutputBaseFilename=SudoStudio-Enterprise-Setup
Compression=lzma
SolidCompression=yes
PrivilegesRequired=admin
ArchitecturesInstallIn64BitMode=x64

[Files]
Source: "build\SudoStudio\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

[Icons]
Name: "{group}\SudoStudio Enterprise"; Filename: "{app}\start.bat"
Name: "{commondesktop}\SudoStudio Enterprise"; Filename: "{app}\start.bat"

[Run]
Filename: "{app}\start.bat"; Description: "Launch SudoStudio Enterprise"; Flags: nowait postinstall skipifsilent shellexec
'@

          Set-Content -Path "installer.iss" -Value $issContent -Encoding ASCII

      - name: Build installer
        run: iscc installer.iss

      - name: Verify build output
        run: |
          dir build\SudoStudio\
          dir Output\

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SudoStudio-Enterprise-Installer
          path: Output\*.exe
