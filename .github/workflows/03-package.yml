name: SudoStudio Final Build

on:
  workflow_dispatch:
    inputs:
      backend_run_id:
        required: true
      runtime_run_id:
        required: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: juleszackaria-lab/sudo-studio
          path: source

      - name: Download backend
        uses: dawidd6/action-download-artifact@v5
        with:
          repo: juleszackaria-lab/sudo-studio
          name: backend-exe
          path: build/backend
          run_id: ${{ github.event.inputs.backend_run_id }}

      - name: Download runtime
        uses: dawidd6/action-download-artifact@v5
        with:
          repo: juleszackaria-lab/sudo-studio
          name: runtime-exe
          path: build/runtime
          run_id: ${{ github.event.inputs.runtime_run_id }}

      - name: Prepare folders
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path build\SudoStudio\app\extensions

      - name: Download VSCodium
        shell: powershell
        run: |
          Invoke-WebRequest "https://github.com/VSCodium/vscodium/releases/download/1.97.2.25045/VSCodium-win32-x64-1.97.2.25045.zip" -OutFile vscodium.zip

      - name: Extract VSCodium
        shell: powershell
        run: |
          Expand-Archive vscodium.zip -DestinationPath build\SudoStudio\app -Force

      - name: Copy files
        shell: powershell
        run: |
          Copy-Item build\backend\backend.exe build\SudoStudio\app\backend.exe -Force
          Copy-Item build\runtime\server.exe build\SudoStudio\app\runtime.exe -Force
          Copy-Item source\product.json build\SudoStudio\app\product.json -Force
          Copy-Item source\logo.ico build\SudoStudio\logo.ico -Force

      - name: Create extension SAFE
        shell: powershell
        run: |
          $dir="build\SudoStudio\app\extensions\sudo-ai"
          New-Item -ItemType Directory -Force -Path $dir

          Add-Content "$dir\package.json" '{'
          Add-Content "$dir\package.json" '"name":"sudo-ai",'
          Add-Content "$dir\package.json" '"displayName":"Sudo AI",'
          Add-Content "$dir\package.json" '"version":"1.0.0",'
          Add-Content "$dir\package.json" '"engines":{"vscode":"^1.97.0"},'
          Add-Content "$dir\package.json" '"activationEvents":["*"],'
          Add-Content "$dir\package.json" '"main":"extension.js"'
          Add-Content "$dir\package.json" '}'

          Add-Content "$dir\extension.js" 'const vscode=require("vscode");'
          Add-Content "$dir\extension.js" 'function activate(context){'
          Add-Content "$dir\extension.js" 'const panel=vscode.window.createWebviewPanel("sudoAI","Sudo AI",vscode.ViewColumn.Beside,{enableScripts:true});'
          Add-Content "$dir\extension.js" 'panel.webview.html="<html><body><h2>Sudo AI</h2><input id=input><button onclick=send()>Send</button><div id=chat></div><script>async function send(){let i=document.getElementById(\"input\");let c=document.getElementById(\"chat\");let m=i.value;c.innerHTML+=\"<div>\"+m+\"</div>\";try{let r=await fetch(\"http://localhost:5000/chat\",{method:\"POST\",headers:{\"Content-Type\":\"application/json\"},body:JSON.stringify({message:m})});let d=await r.json();c.innerHTML+=\"<div>\"+d.reply+\"</div>\";}catch(e){c.innerHTML+=\"<div>ERR</div>\";}i.value=\"\";}</script></body></html>";'
          Add-Content "$dir\extension.js" '}'
          Add-Content "$dir\extension.js" 'exports.activate=activate;'

      - name: Create start.bat SAFE
        shell: powershell
        run: |
          $bat="build\SudoStudio\start.bat"
          Add-Content $bat "@echo off"
          Add-Content $bat "set APP=%~dp0app"
          Add-Content $bat "start \"\" \"%APP%\backend.exe\""
          Add-Content $bat "start \"\" \"%APP%\runtime.exe\""
          Add-Content $bat "timeout /t 3"
          Add-Content $bat "start \"\" \"%APP%\VSCodium.exe\" --extensions-dir \"%APP%\extensions\""

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Create installer
        shell: powershell
        run: |
          $iss="installer.iss"
          Add-Content $iss "[Setup]"
          Add-Content $iss "AppName=SudoStudio Enterprise"
          Add-Content $iss "AppVersion=1.0"
          Add-Content $iss "DefaultDirName={autopf}\SudoStudio"
          Add-Content $iss "OutputDir=Output"
          Add-Content $iss "OutputBaseFilename=SudoStudio-Enterprise"
          Add-Content $iss "SetupIconFile=build\SudoStudio\logo.ico"

          Add-Content $iss "[Files]"
          Add-Content $iss 'Source: "build\SudoStudio\*"; DestDir: "{app}"; Flags: recursesubdirs'

          Add-Content $iss "[Icons]"
          Add-Content $iss 'Name: "{group}\SudoStudio Enterprise"; Filename: "{app}\start.bat"'
          Add-Content $iss 'Name: "{commondesktop}\SudoStudio Enterprise"; Filename: "{app}\start.bat"'

      - name: Build installer
        run: iscc installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SudoStudio-Installer
          path: Output\*.exe