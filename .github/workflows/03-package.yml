name: SudoStudio Startup Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download backend
        uses: dawidd6/action-download-artifact@v5
        with:
          repo: juleszackaria-lab/sudo-studio
          name: backend-exe
          path: build/backend
          run_id: 23684339778

      - name: Download runtime
        uses: dawidd6/action-download-artifact@v5
        with:
          repo: juleszackaria-lab/sudo-studio
          name: runtime-exe
          path: build/runtime
          run_id: 23684715163

      - name: Prepare folders
        shell: cmd
        run: |
          if not exist build mkdir build
          if not exist build\SudoStudio mkdir build\SudoStudio
          if not exist build\SudoStudio\app mkdir build\SudoStudio\app
          if not exist build\SudoStudio\app\extensions mkdir build\SudoStudio\app\extensions

      - name: Download VSCodium
        shell: powershell
        run: Invoke-WebRequest https://github.com/VSCodium/vscodium/releases/download/1.97.2.25045/VSCodium-win32-x64-1.97.2.25045.zip -OutFile vscodium.zip

      - name: Extract VSCodium
        shell: powershell
        run: Expand-Archive vscodium.zip build\SudoStudio\app -Force

      - name: Copy files
        shell: cmd
        run: |
          copy build\backend\backend.exe build\SudoStudio\app\backend.exe /Y
          copy build\runtime\server.exe build\SudoStudio\app\runtime.exe /Y
          if exist logo.ico copy logo.ico build\SudoStudio\logo.ico /Y

      # ===== EXTENSION STARTUP UI =====
      - name: Create AI extension PRO
        shell: powershell
        run: |
          $dir="build/SudoStudio/app/extensions/sudo-ai"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null

          Set-Content "$dir/package.json" '{"name":"sudo-ai","displayName":"Sudo AI","version":"1.0.0","engines":{"vscode":"^1.97.0"},"activationEvents":["*"],"main":"extension.js"}'

          @"
const vscode = require('vscode');

function activate(context) {
    const panel = vscode.window.createWebviewPanel(
        'sudoAI',
        'Sudo AI',
        vscode.ViewColumn.Beside,
        { enableScripts: true }
    );

    panel.webview.html = getHtml();
}

function getHtml(){
return `
<!DOCTYPE html>
<html>
<body style="margin:0;display:flex;height:100vh;font-family:sans-serif;background:#1e1e1e;color:white">

<!-- SIDEBAR -->
<div style="width:220px;background:#252526;padding:10px;">
<h3>Sudo AI</h3>
<select id="model" style="width:100%">
<option>default</option>
<option>fast</option>
<option>pro</option>
</select>
<br><br>
<button onclick="clearChat()">Clear</button>
</div>

<!-- CHAT -->
<div style="flex:1;display:flex;flex-direction:column">
<div id="chat" style="flex:1;overflow:auto;padding:10px"></div>

<div style="display:flex;border-top:1px solid #444">
<input id="msg" style="flex:1;padding:10px;background:#1e1e1e;color:white;border:none">
<button onclick="send()" style="width:100px">Send</button>
</div>
</div>

<script>
async function send(){
    let input = document.getElementById("msg");
    let chat = document.getElementById("chat");
    let model = document.getElementById("model").value;

    let message = input.value;
    if(!message) return;

    chat.innerHTML += "<div><b>You:</b> "+message+"</div>";

    let ports = [5000,5001,5002,5003];
    let success = false;

    for(let p of ports){
        try{
            const res = await fetch("http://localhost:"+p+"/chat", {
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body: JSON.stringify({message:message, model:model})
            });

            const data = await res.json();
            chat.innerHTML += "<div style='color:lightgreen'><b>AI:</b> "+data.reply+"</div>";
            success = true;
            break;
        }catch(e){}
    }

    if(!success){
        chat.innerHTML += "<div style='color:red'>Backend non trouvé</div>";
    }

    input.value="";
    chat.scrollTop = chat.scrollHeight;
}

function clearChat(){
    document.getElementById("chat").innerHTML="";
}
</script>

</body>
</html>
`;
}

exports.activate = activate;
"@ | Set-Content "$dir/extension.js"

      # ===== START PRO =====
      - name: Create start.bat
        shell: cmd
        run: |
          echo @echo off > build\SudoStudio\start.bat
          echo set BASE=%%~dp0 >> build\SudoStudio\start.bat
          echo set APP=%%BASE%%app >> build\SudoStudio\start.bat

          echo start "" "%%APP%%\backend.exe" >> build\SudoStudio\start.bat
          echo start "" "%%APP%%\runtime.exe" >> build\SudoStudio\start.bat

          echo timeout /t 3 ^>nul >> build\SudoStudio\start.bat

          echo start "" "%%APP%%\VSCodium.exe" --extensions-dir "%%APP%%\extensions" >> build\SudoStudio\start.bat

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Create installer
        shell: cmd
        run: |
          echo [Setup] > installer.iss
          echo AppName=SudoStudio Enterprise >> installer.iss
          echo AppVersion=1.0 >> installer.iss
          echo DefaultDirName={autopf}\SudoStudio >> installer.iss
          echo OutputDir=Output >> installer.iss
          echo OutputBaseFilename=SudoStudio-Enterprise >> installer.iss
          echo SetupIconFile=build\SudoStudio\logo.ico >> installer.iss
          echo [Files] >> installer.iss
          echo Source: "build\SudoStudio\*"; DestDir: "{app}"; Flags: recursesubdirs >> installer.iss
          echo [Icons] >> installer.iss
          echo Name: "{group}\SudoStudio Enterprise"; Filename: "{app}\start.bat" >> installer.iss
          echo Name: "{commondesktop}\SudoStudio Enterprise"; Filename: "{app}\start.bat" >> installer.iss

      - name: Build installer
        run: iscc installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SudoStudio-Startup
          path: Output\*.exe