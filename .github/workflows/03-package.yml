name: '03 - SudoStudio Enterprise Packager'

on:
  workflow_dispatch:
    inputs:
      backend_run_id:
        description: 'Backend Run ID'
        required: true
      runtime_run_id:
        description: 'Runtime Run ID'
        required: true

jobs:
  package:
    runs-on: windows-latest

    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout sudo-studio source
        uses: actions/checkout@v4
        with:
          repository: juleszackaria-lab/sudo-studio
          path: source
          token: ${{ secrets.PAT_DOWNLOAD }}

      - name: Download backend artifact
        uses: dawidd6/action-download-artifact@v5
        with:
          repo: juleszackaria-lab/sudo-studio
          name: backend-exe
          path: build/backend
          run_id: ${{ github.event.inputs.backend_run_id }}
          github_token: ${{ secrets.PAT_DOWNLOAD }}

      - name: Download runtime artifact
        uses: dawidd6/action-download-artifact@v5
        with:
          repo: juleszackaria-lab/sudo-studio
          name: runtime-exe
          path: build/runtime
          run_id: ${{ github.event.inputs.runtime_run_id }}
          github_token: ${{ secrets.PAT_DOWNLOAD }}

      - name: Prepare build folders
        shell: cmd
        run: |
          if not exist build mkdir build
          if not exist build\SudoStudio mkdir build\SudoStudio
          if not exist build\SudoStudio\app mkdir build\SudoStudio\app

      - name: Download VSCodium
        shell: powershell
        run: |
          $url = "https://github.com/VSCodium/vscodium/releases/download/1.97.2.25045/VSCodium-win32-x64-1.97.2.25045.zip"
          Invoke-WebRequest -Uri $url -OutFile "vscodium.zip"

      - name: Extract VSCodium
        shell: powershell
        run: |
          Expand-Archive -Path "vscodium.zip" -DestinationPath "build\SudoStudio\app" -Force

      - name: Copy project files
        shell: cmd
        run: |
          copy build\backend\backend.exe build\SudoStudio\app\ /Y
          copy build\runtime\server.exe build\SudoStudio\app\runtime.exe /Y
          xcopy /E /I /Y source\web-ui build\SudoStudio\app\web-ui\
          copy /Y source\product.json build\SudoStudio\app\product.json
          copy /Y source\setup.bat build\SudoStudio\
          copy /Y source\setup.sh build\SudoStudio\

      # === NOUVELLE ÉTAPE : créer l’extension Sudo AI ===
      - name: Create VS Code extension for Sudo AI
        shell: cmd
        run: |
          mkdir build\SudoStudio\app\extensions\sudo-ai

          REM package.json
          echo {^
            "name": "sudo-ai",^
            "displayName": "Sudo AI",^
            "description": "Copilot-style AI Chat",^
            "version": "1.0.0",^
            "engines": { "vscode": "^1.97.0" },^
            "activationEvents": ["*"],^
            "main": "./extension.js"^
          } > build\SudoStudio\app\extensions\sudo-ai\package.json

          REM extension.js
          echo const vscode = require('vscode'); > build\SudoStudio\app\extensions\sudo-ai\extension.js
          echo function activate(context) { >> build\SudoStudio\app\extensions\sudo-ai\extension.js
          echo const panel = vscode.window.createWebviewPanel('sudoAI','Sudo AI', vscode.ViewColumn.Beside,{enableScripts:true}); >> build\SudoStudio\app\extensions\sudo-ai\extension.js
          echo panel.webview.html = require('fs').readFileSync(__dirname + '\\webview.html','utf8'); >> build\SudoStudio\app\extensions\sudo-ai\extension.js
          echo } >> build\SudoStudio\app\extensions\sudo-ai\extension.js
          echo exports.activate = activate; >> build\SudoStudio\app\extensions\sudo-ai\extension.js

          REM webview.html
          echo ^<html^>^<body^>^<h1^>Sudo AI Chat^</h1^>^<input id="input" placeholder="Entrez un message" style="width:80%"^>^<button onclick="sendMessage()"^>Envoyer^</button^>^<div id="messages" style="margin-top:10px;height:300px;overflow:auto;border:1px solid #ccc;"^>^</div^>^<script^>function sendMessage(){const msg=document.getElementById('input').value;const div=document.getElementById('messages');div.innerHTML+='<div>> '+msg+'</div>';document.getElementById('input').value='';}^</script^>^</body^>^</html^> > build\SudoStudio\app\extensions\sudo-ai\webview.html

      - name: Create smart start.bat
        shell: cmd
        run: |
          echo @echo off > build\SudoStudio\start.bat
          echo setlocal >> build\SudoStudio\start.bat
          echo set "BASE=%%~dp0" >> build\SudoStudio\start.bat
          echo set "LOG=%%BASE%%launch.log" >> build\SudoStudio\start.bat

          echo echo START > "%%LOG%%" >> build\SudoStudio\start.bat

          echo for /r "%%BASE%%" %%%%F in ^(backend.exe^) do set "BACKEND=%%%%F" >> build\SudoStudio\start.bat
          echo for /r "%%BASE%%" %%%%F in ^(runtime.exe^) do set "RUNTIME=%%%%F" >> build\SudoStudio\start.bat

          echo for /r "%%BASE%%" %%%%F in ^(VSCodium.exe^) do set "CODIUM=%%%%F" >> build\SudoStudio\start.bat
          echo if not defined CODIUM for /r "%%BASE%%" %%%%F in ^(codium.exe^) do set "CODIUM=%%%%F" >> build\SudoStudio\start.bat

          echo for /d /r "%%BASE%%" %%%%D in ^(web-ui^) do set "WEBUI=%%%%D" >> build\SudoStudio\start.bat

          echo if defined BACKEND start "" "%%BACKEND%%" >> build\SudoStudio\start.bat
          echo if defined RUNTIME start "" "%%RUNTIME%%" >> build\SudoStudio\start.bat

          echo timeout /t 3 /nobreak ^>nul >> build\SudoStudio\start.bat

          echo if defined CODIUM ^( >> build\SudoStudio\start.bat
          echo if defined WEBUI start "" "%%CODIUM%%" --user-data-dir "%%BASE%%data" --extensions-dir "%%BASE%%app\extensions" "%%WEBUI%%" >> build\SudoStudio\start.bat
          echo if not defined WEBUI start "" "%%CODIUM%%" --user-data-dir "%%BASE%%data" --extensions-dir "%%BASE%%app\extensions" >> build\SudoStudio\start.bat
          echo ^) >> build\SudoStudio\start.bat

      - name: Install Inno Setup
        shell: cmd
        run: choco install innosetup -y

      - name: Generate installer.iss
        shell: cmd
        run: |
          echo [Setup] > installer.iss
          echo AppName=SudoStudio Enterprise >> installer.iss
          echo AppVersion=1.0.0 >> installer.iss
          echo AppPublisher=SudoStudio Lab >> installer.iss
          echo DefaultDirName={autopf}\SudoStudio >> installer.iss
          echo DefaultGroupName=SudoStudio >> installer.iss
          echo OutputDir=Output >> installer.iss
          echo OutputBaseFilename=SudoStudio-Enterprise-Setup >> installer.iss
          echo Compression=lzma >> installer.iss
          echo SolidCompression=yes >> installer.iss
          echo PrivilegesRequired=lowest >> installer.iss
          echo ArchitecturesInstallIn64BitMode=x64 >> installer.iss

          echo. >> installer.iss
          echo [Files] >> installer.iss
          echo Source: "build\SudoStudio\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs >> installer.iss

          echo. >> installer.iss
          echo [Icons] >> installer.iss
          echo Name: "{group}\SudoStudio Enterprise"; Filename: "cmd.exe"; Parameters: "/c ""{app}\start.bat""" >> installer.iss
          echo Name: "{commondesktop}\SudoStudio Enterprise"; Filename: "cmd.exe"; Parameters: "/c ""{app}\start.bat""" >> installer.iss

          echo. >> installer.iss
          echo [Run] >> installer.iss
          echo Filename: "cmd.exe"; Parameters: "/c ""{app}\start.bat"""; Flags: nowait postinstall skipifsilent >> installer.iss

      - name: Build installer
        run: iscc installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SudoStudio-Enterprise-Installer
          path: Output\*.exe