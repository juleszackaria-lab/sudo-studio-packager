- name: Create start.bat (PRO VERSION)
        shell: cmd
        run: |
          echo @echo off > build\SudoStudio\start.bat
          echo setlocal enabledelayedexpansion >> build\SudoStudio\start.bat
          echo title SudoStudio Enterprise >> build\SudoStudio\start.bat
          echo set SCRIPT_DIR=%%~dp0 >> build\SudoStudio\start.bat
          echo set LOG=%%SCRIPT_DIR%%debug.log >> build\SudoStudio\start.bat

          echo echo ============================ ^>^> %%LOG%% >> build\SudoStudio\start.bat
          echo echo START %%date%% %%time%% ^>^> %%LOG%% >> build\SudoStudio\start.bat

          echo echo Searching backend... >> build\SudoStudio\start.bat
          echo set BACKEND= >> build\SudoStudio\start.bat
          echo for /r "%%SCRIPT_DIR%%app" %%%%F in (backend.exe) do set BACKEND=%%%%F >> build\SudoStudio\start.bat
          echo if defined BACKEND ( >> build\SudoStudio\start.bat
          echo   echo Found backend: %%BACKEND%% ^>^> %%LOG%% >> build\SudoStudio\start.bat
          echo   start "" "%%BACKEND%%" >> build\SudoStudio\start.bat
          echo ) else ( >> build\SudoStudio\start.bat
          echo   echo backend NOT FOUND ^>^> %%LOG%% >> build\SudoStudio\start.bat
          echo ) >> build\SudoStudio\start.bat

          echo echo Searching runtime... >> build\SudoStudio\start.bat
          echo set RUNTIME= >> build\SudoStudio\start.bat
          echo for /r "%%SCRIPT_DIR%%app" %%%%F in (runtime.exe) do set RUNTIME=%%%%F >> build\SudoStudio\start.bat
          echo if defined RUNTIME ( >> build\SudoStudio\start.bat
          echo   echo Found runtime: %%RUNTIME%% ^>^> %%LOG%% >> build\SudoStudio\start.bat
          echo   start "" "%%RUNTIME%%" >> build\SudoStudio\start.bat
          echo ) else ( >> build\SudoStudio\start.bat
          echo   echo runtime NOT FOUND ^>^> %%LOG%% >> build\SudoStudio\start.bat
          echo ) >> build\SudoStudio\start.bat

          echo timeout /t 3 /nobreak ^>nul >> build\SudoStudio\start.bat

          echo echo Searching codium... >> build\SudoStudio\start.bat
          echo set CODIUM= >> build\SudoStudio\start.bat
          echo for /r "%%SCRIPT_DIR%%app" %%%%F in (codium.exe) do set CODIUM=%%%%F >> build\SudoStudio\start.bat
          echo if defined CODIUM ( >> build\SudoStudio\start.bat
          echo   echo Found codium: %%CODIUM%% ^>^> %%LOG%% >> build\SudoStudio\start.bat
          echo   start "" "%%CODIUM%%" --user-data-dir "%%SCRIPT_DIR%%data" --extensions-dir "%%SCRIPT_DIR%%extensions" --folder "%%SCRIPT_DIR%%app\web-ui" >> build\SudoStudio\start.bat
          echo ) else ( >> build\SudoStudio\start.bat
          echo   echo codium NOT FOUND ^>^> %%LOG%% >> build\SudoStudio\start.bat
          echo   echo ERROR: codium not found >> build\SudoStudio\start.bat
          echo   pause >> build\SudoStudio\start.bat
          echo ) >> build\SudoStudio\start.bat

          echo echo END ^>^> %%LOG%% >> build\SudoStudio\start.bat